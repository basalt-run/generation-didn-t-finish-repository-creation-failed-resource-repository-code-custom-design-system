name: Publish NPM

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
      - 'components.json'
      - 'icons/**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - name: Bump version and commit
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          git add package.json
          git diff --staged --quiet || (git commit -m "chore: bump version [skip ci]" && git push)

      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          npm publish --access public

      - name: Create Release
        if: env.NPM_TOKEN == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: v${{ env.NEW_VERSION }}
          body: |
            📦 Design system build complete!

            **Version:** v${{ env.NEW_VERSION }}

            All dist/ files (tokens, components, CSS, Tailwind) have been generated and committed.

            ### Next Steps

            To publish this release to npm, run:

            \`\`\`bash
            npm publish
            \`\`\`

            **Requirements:**
            - You have an npm account
            - You have an npm token (create at https://npmjs.com/settings/token)
            - Set \`NPM_TOKEN\` secret in GitHub for auto-publishing in future releases

            **Or**, allow GitHub Actions to auto-publish by:
            1. Go to Settings → Secrets and variables → Actions
            2. Add \`NPM_TOKEN\` with your npm token
            3. Next token change will auto-publish

            ---

            Generated by Basalt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
